module: myeasymocap.stages.basestage.MultiStage
args:
  output: D:/08A4_kgy/emc_output/cam01/sv1p
  at_step:
    detect:
      module: myeasymocap.backbone.yolo.yolo.YoloWithTrack
      key_from_data:
      - images
      - imgnames
      args:
        model: yolov5m
        name: person
    keypoints2d:
      module: myeasymocap.backbone.hrnet.myhrnet.MyHRNet
      key_from_data:
      - images
      - imgnames
      key_from_previous:
      - bbox
      key_keep: []
      args:
        ckpt: data/models/pose_hrnet_w48_384x288.pth
    vis2d:
      module: myeasymocap.io.vis.Vis2D
      skip: false
      key_from_data:
      - images
      key_from_previous:
      - keypoints
      - bbox
      args:
        name: vis_keypoints2d
        scale: 0.5
    infer:
      module: myeasymocap.backbone.pare.pare.MyPARE
      key_from_data:
      - images
      - imgnames
      key_from_previous:
      - bbox
      key_keep:
      - cameras
      - imgnames
      args:
        ckpt: 3dpw
  at_final:
    load_body_model:
      module: myeasymocap.io.model.SMPLLoader
      args:
        model_path: models/pare/data/body_models/smpl/SMPL_NEUTRAL.pkl
        regressor_path: models/J_regressor_body25.npy
    write:
      module: myeasymocap.io.write.WriteSMPL
      key_from_data:
      - meta
      key_from_previous:
      - params
      - model
      args:
        name: smpl
    render:
      module: myeasymocap.io.vis3d.Render
      key_from_data:
      - cameras
      - imgnames
      key_from_previous:
      - params
      - body_model
      args:
        backend: pyrender
    make_video:
      module: myeasymocap.io.video.MakeVideo
      args:
        fps: 30
        keep_image: true
